<!doctype html>
<html>
  <head>
    <title>Library Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <h1>Library Management System</h1>

      <h2>Add Books to Inventory</h2>
      <div class="add-book-form">
        <div class="form-group">
          <input type="text" id="isbn" placeholder="Enter ISBN Number" />
          <button onclick="verifyISBN()">Verify ISBN</button>
        </div>

        <div id="isbnDetailsSection" style="margin-top: 15px">
          <div class="form-group">
            <input type="text" id="title" placeholder="Book Title" disabled />
            <input type="text" id="author" placeholder="Author" disabled />
          </div>

          <div class="form-group" style="margin-top: 10px">
            <label for="bookType">Book Classification: </label>
            <select id="bookType" onchange="toggleGenreField()" disabled>
              <option value="GENERAL">General / Standard</option>
              <option value="FICTION">Fiction</option>
              <option value="ACADEMIC">Academic Book</option>
              <option value="MAGAZINE">Magazine</option>
            </select>
          </div>

          <div id="genreGroup" style="display: none; margin-top: 10px">
            <input
              type="text"
              id="genre"
              placeholder="Genre (e.g., Sci-Fi, Fantasy)"
            />
          </div>

          <div id="subjectGroup" style="display: none; margin-top: 10px">
            <input
              type="text"
              id="subject"
              placeholder="Subject (e.g., Physics, History)"
            />
          </div>

          <div id="issueNumberGroup" style="display: none; margin-top: 10px">
            <input
              type="text"
              id="issueNumber"
              placeholder="Issue/Volume Number (e.g., Vol. 12)"
            />
          </div>

          <div class="form-group" style="margin-top: 10px">
            <input
              type="number"
              id="quantity"
              placeholder="Number of copies to add"
              value="1"
              min="1"
            />
            <button
              id="submitBookBtn"
              onclick="addBookBatch()"
              style="display: block; margin-top: 10px"
            >
              Add Copies to Inventory
            </button>
          </div>
        </div>
      </div>

      <hr />
      <h2>Books List</h2>
      <table id="bookTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>ISBN</th>
            <th>Title</th>
            <th>Author</th>
            <th>Available</th>
            <th>Issued To</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <h2>Add User</h2>
      <input type="number" id="userId" placeholder="User ID" />
      <input type="text" id="userName" placeholder="User Name" />
      <button onclick="addUser()">Add User</button>
      <h2>Users</h2>
      <table id="userTable">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Name</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <h2>Issue Book</h2>
      <input type="number" id="issueBookId" placeholder="Book ID" />
      <input type="number" id="issueUserId" placeholder="User ID" />
      <button onclick="issueBook()">Issue</button>
      <h2>Return Book</h2>
      <input type="number" id="returnBookId" placeholder="Book ID" />
      <button onclick="returnBook()">Return</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
